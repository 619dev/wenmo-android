name: Android Release - Build & Deploy

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例: 0.4.0)'
        required: true
        default: '0.4.0'
permissions:
  contents: write   # 关键：允许创建 Release
jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: 设置Gradle Wrapper
      uses: gradle/gradle-build-action@v2

    - name: 授予Gradle执行权限
      run: chmod +x gradlew

    - name: Check for required secrets
      id: check_secrets
      run: |
          if [ -n "${{ secrets.KEYSTORE_FILE }}" ] && [ -n "${{ secrets.KEY_ALIAS }}" ] && [ -n "${{ secrets.KEYSTORE_PASSWORD }}" ] && [ -n "${{ secrets.KEY_PASSWORD }}" ]; then
            echo "result=success" >> $GITHUB_OUTPUT
            echo "has_secrets=true" >> $GITHUB_OUTPUT
          else
            echo "result=failure" >> $GITHUB_OUTPUT
            echo "has_secrets=false" >> $GITHUB_OUTPUT
            echo "Some required secrets are missing." >&2
          fi
      shell: bash

    # 使用GitHub Secrets配置签名
    - name: 配置签名密钥
      if: steps.check_secrets.outputs.has_secrets == 'true'
      run: |
        # 解码base64编码的密钥文件，保存在根目录下
        echo "${{ secrets.KEYSTORE_FILE }}" | base64 -d > wenmo-release.jks

        # 创建keystore.properties
        # 这里的 storeFile 可以写成相对路径，在 build.gradle.kts 中我们增加了双重相对路径（对根项目和对子项目）解析来确保安全
        echo "storeFile=wenmo-release.jks" > keystore.properties
        echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> keystore.properties
        echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> keystore.properties
        echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> keystore.properties

    # 未配置签名时构建未签名APK / 调试版APK
    - name: 构建发布版APK
      run: |
        if [ -f "keystore.properties" ]; then
          echo "使用签名配置构建..."
          ./gradlew assembleRelease --stacktrace
        else
          echo "⚠️ 未配置签名，构建调试版APK..."
          ./gradlew assembleDebug --stacktrace
          mkdir -p app/build/outputs/apk/release
          cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/release/app-release.apk || true
        fi

    - name: 重命名APK
      run: |
        cd app/build/outputs/apk/release
        if [ -f "app-release.apk" ]; then
          VERSION="${{ github.event.inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          mv app-release.apk "wenmo-v${VERSION}.apk"
          echo "APK_NAME=wenmo-v${VERSION}.apk" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_ENV
        fi

    - name: 生成变更日志
      id: changelog
      run: |
        echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
        echo "## 🚀 问墨输入法 (Wenmo IME) v${{ env.VERSION }}" >> $GITHUB_OUTPUT
        echo "" >> $GITHUB_OUTPUT
        echo "### 📱 应用信息" >> $GITHUB_OUTPUT
        echo "- **版本号**: ${{ env.VERSION }}" >> $GITHUB_OUTPUT
        echo "- **包名**: ink.wenmo.ime" >> $GITHUB_OUTPUT
        echo "- **最低版本**: Android 8.0 (API 26)" >> $GITHUB_OUTPUT
        echo "" >> $GITHUB_OUTPUT
        echo "### ✨ 功能特性" >> $GITHUB_OUTPUT
        echo "- 极致简约与设计感" >> $GITHUB_OUTPUT
        echo "- 离线与隐私保护优先" >> $GITHUB_OUTPUT
        echo "- 智能联想与按键纠错" >> $GITHUB_OUTPUT
        echo "" >> $GITHUB_OUTPUT
        echo "### 📥 安装说明" >> $GITHUB_OUTPUT
        echo "1. 下载 APK 文件" >> $GITHUB_OUTPUT
        echo "2. 在设备上启用 \"未知来源\" 安装" >> $GITHUB_OUTPUT
        echo "3. 安装并激活输入法，在系统设置中切换为问墨输入法" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: 创建GitHub Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: app/build/outputs/apk/release/${{ env.APK_NAME }}
        body: ${{ steps.changelog.outputs.CHANGELOG }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: 上传Release APK
      uses: actions/upload-artifact@v4
      with:
        name: wenmo-release
        path: app/build/outputs/apk/release/${{ env.APK_NAME }}

    - name: 构建完成通知
      run: |
        echo "🎉 发布版本构建完成！"
        echo "📱 应用包名: ink.wenmo.ime"
        echo "🏷️  版本: ${{ env.VERSION }}"
        if [ -f "keystore.properties" ]; then
          echo "✅ 签名: 已签名"
        else
          echo "⚠️  签名: 未签名（请配置GitHub Secrets）"
        fi

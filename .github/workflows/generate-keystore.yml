name: Generate Release Keystore

on:
  workflow_dispatch:
    inputs:
      key_alias:
        description: '密钥别名'
        required: true
        default: 'wenmo'
      keystore_password:
        description: '密钥库密码（至少6个字符）'
        required: true
        default: 'wenmo2026'
      key_password:
        description: '密钥密码（至少6个字符）'
        required: true
        default: 'wenmo2026'
      validity_days:
        description: '有效期（天）'
        required: true
        default: '10000'

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
    - name: 设置JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: 生成Keystore
      run: |
        keytool -genkeypair \
          -v \
          -keystore wenmo-release.jks \
          -alias ${{ github.event.inputs.key_alias }} \
          -keyalg RSA \
          -keysize 2048 \
          -validity ${{ github.event.inputs.validity_days }} \
          -storepass ${{ github.event.inputs.keystore_password }} \
          -keypass ${{ github.event.inputs.key_password }} \
          -dname "CN=Wenmo, OU=Development, O=Wenmo, L=Beijing, S=Beijing, C=CN"

    - name: 获取SHA1和SHA256签名
      id: get_signatures
      run: |
        echo "=== Keystore 信息 ==="
        keytool -list -v -keystore wenmo-release.jks \
          -storepass ${{ github.event.inputs.keystore_password }} \
          -alias ${{ github.event.inputs.key_alias }}

        echo ""
        echo "=== 提取签名信息 ==="
        SHA1=$(keytool -list -v -keystore wenmo-release.jks \
          -storepass ${{ github.event.inputs.keystore_password }} \
          -alias ${{ github.event.inputs.key_alias }} | \
          grep "SHA1:" | sed 's/.*SHA1: //')

        SHA256=$(keytool -list -v -keystore wenmo-release.jks \
          -storepass ${{ github.event.inputs.keystore_password }} \
          -alias ${{ github.event.inputs.key_alias }} | \
          grep "SHA256:" | sed 's/.*SHA256: //')

        echo "sha1=$SHA1" >> $GITHUB_OUTPUT
        echo "sha256=$SHA256" >> $GITHUB_OUTPUT

    - name: 转换Keystore为Base64
      id: encode
      run: |
        BASE64_KEYSTORE=$(base64 -w 0 wenmo-release.jks)
        echo "keystore_base64=$BASE64_KEYSTORE" >> $GITHUB_OUTPUT
        echo "✅ Keystore已转换为Base64"

    - name: 上传Keystore文件
      uses: actions/upload-artifact@v4
      with:
        name: keystore-files
        path: wenmo-release.jks
        retention-days: 7

    - name: 📋 配置说明
      run: |
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "🔐 签名证书已生成！"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo ""
        echo "📱 应用基本配置信息："
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "包名 (PackageName): ink.wenmo.ime"
        echo "SHA1 签名: ${{ steps.get_signatures.outputs.sha1 }}"
        echo "SHA256 签名: ${{ steps.get_signatures.outputs.sha256 }}"
        echo ""
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "⚙️  GitHub Secrets 配置步骤："
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo ""
        echo "前往: Settings > Secrets and variables > Actions > New repository secret"
        echo ""
        echo "创建以下4个Secrets："
        echo ""
        echo "1. 名称: KEYSTORE_FILE"
        echo "   值: (查看下方Base64输出)"
        echo ""
        echo "2. 名称: KEYSTORE_PASSWORD"
        echo "   值: ${{ github.event.inputs.keystore_password }}"
        echo ""
        echo "3. 名称: KEY_ALIAS"
        echo "   值: ${{ github.event.inputs.key_alias }}"
        echo ""
        echo "4. 名称: KEY_PASSWORD"
        echo "   值: ${{ github.event.inputs.key_password }}"
        echo ""
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "📦 KEYSTORE_FILE Base64值："
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "${{ steps.encode.outputs.keystore_base64 }}"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo ""
        echo "✅ 配置完成后，即可触发 Release workflow 构建签名APK"
        echo ""
